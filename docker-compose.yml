version: '3.8'

services:
  bot:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - api

  api:
    build: .
    command: node src/api/server.js
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file:
      - .env

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
